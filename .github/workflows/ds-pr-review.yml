name: ds-pr-review

# Advisory AI PR review. Posts inline review comments derived from the
# .skills/ds-pr-review rubric via an OpenAI-compatible gateway. By design this
# check is NEVER red: a missing key, an LLM/API failure, or a parse error all
# result in an exit-0 (green/neutral) run.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ds-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip PRs from forks: GITHUB_TOKEN is read-only there and head SHAs differ.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Guard — require an LLM key (advisory, never red)
        id: guard
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "ds-pr-review: no LLM key configured, skipping (advisory)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The runner uses only the Python standard library (urllib) — no pip
      # install is needed. The gh CLI is preinstalled on ubuntu-latest and is
      # used only as a fallback PR-data source.

      - name: Run ds-pr-review (advisory)
        if: steps.guard.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://arcyleung-ubuntu.tailb940e6.ts.net/v1/' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
        run: |
          python3 .skills/ds-pr-review/scripts/run_review_github.py
