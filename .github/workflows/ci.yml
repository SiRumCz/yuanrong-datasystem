name: CI

# Look-alike CI for the custody demo mirror of openeuler/yuanrong-datasystem.
# Job names mirror the REAL openEuler gate checks seen on atomgit MRs
# (check_code / check_package_license / check_sca / check_build x{x86_64,aarch64,openyuanrong}).
# These are real, self-contained, lightweight checks (no heavy C++ build) and ADVISORY
# (never fail the job ⇒ reliably green): the demo's point is that ordinary CI is green while
# custody is the gate/risk/plan layer on top. (The real !1076 actually had a transient
# check_code + aarch64 failure that cleared on /retest before merge.)

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check_code:
    name: check_code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: coding style + spec (clang-format + lint, advisory)
        run: |
          set -uo pipefail
          command -v clang-format >/dev/null || { sudo apt-get update -qq && sudo apt-get install -y -qq clang-format >/dev/null 2>&1 || true; }
          base='${{ github.event.pull_request.base.sha }}'
          mapfile -t CHANGED < <(git diff --name-only "$base" HEAD)
          notes=0
          for f in "${CHANGED[@]}"; do
            [ -f "$f" ] || continue
            case "$f" in
              *.c|*.cc|*.cpp|*.cxx|*.h|*.hpp|*.hxx)
                if command -v clang-format >/dev/null && ! clang-format --style=file "$f" | diff -q - "$f" >/dev/null 2>&1; then
                  echo "::notice file=$f::clang-format would reformat (advisory)"; notes=$((notes+1))
                fi ;;
            esac
            case "$f" in
              *.cpp|*.cc|*.h|*.hpp|*.py|*.java)
                grep -nP '\t' "$f" >/dev/null 2>&1 && { echo "::notice file=$f::contains tabs"; notes=$((notes+1)); }
                grep -nE ' +$' "$f" >/dev/null 2>&1 && { echo "::notice file=$f::trailing whitespace"; notes=$((notes+1)); }
                ;;
            esac
          done
          echo "check_code: ${#CHANGED[@]} changed file(s), $notes advisory note(s). (non-blocking)"
          exit 0

  check_package_license:
    name: check_package_license
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: license / SPDX header check (advisory)
        run: |
          set -uo pipefail
          base='${{ github.event.pull_request.base.sha }}'
          mapfile -t CHANGED < <(git diff --name-only "$base" HEAD)
          missing=0
          for f in "${CHANGED[@]}"; do
            [ -f "$f" ] || continue
            case "$f" in
              *.cpp|*.cc|*.h|*.hpp|*.py|*.java|*.go)
                head -8 "$f" | grep -qiE 'copyright|licensed under|SPDX-License-Identifier' \
                  || { echo "::notice file=$f::no license/SPDX header in first 8 lines"; missing=$((missing+1)); } ;;
            esac
          done
          echo "check_package_license: ${#CHANGED[@]} file(s), $missing without a header. (non-blocking)"
          exit 0

  check_sca:
    name: check_sca
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: software composition / secret scan (advisory)
        run: |
          set -uo pipefail
          base='${{ github.event.pull_request.base.sha }}'
          added=$(git diff "$base" HEAD | grep -E '^\+' | grep -vE '^\+\+\+' || true)
          hits=0
          while IFS= read -r pat; do
            [ -z "$pat" ] && continue
            printf '%s\n' "$added" | grep -Eq "$pat" && { echo "::error::potential secret matching /$pat/"; hits=$((hits+1)); }
          done <<'PATTERNS'
          -----BEGIN ([A-Z]+ )?PRIVATE KEY-----
          AKIA[0-9A-Z]{16}
          ghp_[0-9A-Za-z]{30,}
          (password|passwd|secret|api[_-]?key|access[_-]?token)["' ]*[:=]["' ]*[A-Za-z0-9/+_-]{12,}
          PATTERNS
          [ "$hits" -gt 0 ] && echo "check_sca: $hits potential secret(s) flagged (advisory)" || echo "check_sca: clean"
          exit 0

  check_build:
    name: check_build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64, openyuanrong]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: build smoke (${{ matrix.target }})
        run: |
          set -uo pipefail
          base='${{ github.event.pull_request.base.sha }}'
          mapfile -t CHANGED < <(git diff --name-only "$base" HEAD)
          echo "::group::Changed files (${#CHANGED[@]})"; printf '%s\n' "${CHANGED[@]}"; echo "::endgroup::"
          # Bazel/CMake build-file sanity for changed modules
          for f in "${CHANGED[@]}"; do
            case "$f" in
              *BUILD.bazel|BUILD.bazel|*/BUILD|*.bzl|WORKSPACE|*CMakeLists.txt)
                [ -f "$f" ] || continue
                op=$(tr -cd '(' < "$f" | wc -c); cp=$(tr -cd ')' < "$f" | wc -c)
                [ "$op" -eq "$cp" ] || echo "::warning file=$f::unbalanced parentheses ($op vs $cp)"
                echo "  build-file OK: $f" ;;
            esac
          done
          # test presence for changed modules
          tests=0
          for f in "${CHANGED[@]}"; do
            case "$f" in *test*.cpp|*test*.cc|*_test.*|*Test*.java|*test_*.py) tests=$((tests+1));; esac
          done
          echo "check_build (${{ matrix.target }}): build-file sanity OK, $tests test file(s) in diff. (smoke; non-blocking)"
          exit 0
